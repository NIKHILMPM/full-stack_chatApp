---

- name: update apt cache
  apt: 
    update_cache: yes

- name: install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: install docker
  apt:
    name: docker.io
    state: present

- name: start and enable docker
  service:
    name: docker
    state: started
    enabled: yes

- name: add user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

