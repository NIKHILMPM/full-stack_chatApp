---
- name: Download kind binary
  get_url:
    url: https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-amd64
    dest: /usr/local/bin/kind
    mode: '0755'

- name: Create kind cluster config file
  copy:
    dest: /tmp/kind-cluster.yaml
    mode: '0644'
    content: |
      kind: Cluster
      apiVersion: kind.x-k8s.io/v1alpha4
      nodes:
        - role: control-plane
          image: kindest/node:v1.33.1
        - role: worker
          image: kindest/node:v1.33.1
        - role: worker
          image: kindest/node:v1.33.1

- name: Check existing kind clusters
  command: kind get clusters
  register: kind_clusters
  changed_when: false

- name: Create kind cluster
  command: kind create cluster --name dev-cluster --config /tmp/kind-cluster.yaml
  when: "'dev-cluster' not in kind_clusters.stdout"

- name: Ensure ubuntu .kube directory exists
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Copy kubeconfig to ubuntu user
  copy:
    src: /root/.kube/config
    dest: /home/ubuntu/.kube/config
    remote_src: yes
    owner: ubuntu
    group: ubuntu
    mode: '0600'
